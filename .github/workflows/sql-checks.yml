name: SQL Data Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    name: Run data-quality checks (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qa
          POSTGRES_PASSWORD: qa
          POSTGRES_DB: agency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://qa:qa@localhost:5432/agency
      PGPASSWORD: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Load schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql

      - name: Load seed data
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed.sql

      - name: Run data-quality checks
        run: bash scripts/run_checks.sh
